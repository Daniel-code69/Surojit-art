<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Forgot Password — Sarojit Pal Art</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔐%3C/text%3E%3C/svg%3E">
</head>
<body>

  <div class="login-page">
    <!-- Background Floating Shapes -->
    <div class="login-bg-shape login-bg-shape--1"></div>
    <div class="login-bg-shape login-bg-shape--2"></div>
    <div class="login-bg-shape login-bg-shape--3"></div>
    <div class="login-bg-shape login-bg-shape--4"></div>

    <!-- Card -->
    <div class="login-card" id="forgotCard">
      <div class="login-card__body" style="padding-top: var(--space-10);">
        <a href="login.html" class="forgot-card__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Login
        </a>

        <div class="forgot-card__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
        </div>

        <h1 class="login-card__title" style="text-align:center;">Reset Password</h1>
        <p class="login-card__subtitle" style="text-align:center; margin-bottom:var(--space-6);" id="stepSubtitle">Enter your email address to verify your account.</p>

        <!-- Steps Indicator -->
        <div class="forgot-steps">
          <div class="forgot-step active" id="step1Indicator"></div>
          <div class="forgot-step" id="step2Indicator"></div>
        </div>

        <!-- Error Banner -->
        <div class="login-error-banner" id="errorBanner">
          <svg class="login-error-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span class="login-error-banner__text" id="errorText">Error</span>
        </div>

        <!-- Success Banner -->
        <div class="login-success-banner" id="successBanner">
          <svg class="login-success-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span class="login-success-banner__text" id="successText">Success!</span>
        </div>

        <!-- Step 1: Verify Email -->
        <form class="login-form" id="verifyEmailForm">
          <div class="login-input-group" id="emailGroup">
            <label class="login-input-group__label" for="resetEmail">Email Address</label>
            <div class="login-input-group__wrapper">
              <svg class="login-input-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="resetEmail" class="login-input-group__input" placeholder="admin@sarojitpalart.com" required>
            </div>
            <div class="login-input-group__error" id="emailError">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span id="emailErrorText">Please enter a valid email</span>
            </div>
          </div>

          <button type="submit" class="login-btn" id="verifyBtn">
            <span class="login-btn__text">Verify Email</span>
            <div class="login-btn__spinner"></div>
          </button>
        </form>

        <!-- Step 2: New Password (Hidden initially) -->
        <form class="login-form" id="resetPasswordForm" style="display:none;">
          <div class="login-input-group" id="newPasswordGroup">
            <label class="login-input-group__label" for="newPassword">New Password</label>
            <div class="login-input-group__wrapper">
              <svg class="login-input-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="newPassword" class="login-input-group__input" placeholder="Minimum 6 characters" required>
            </div>
          </div>

          <div class="login-input-group" id="confirmPasswordGroup">
            <label class="login-input-group__label" for="confirmPassword">Confirm Password</label>
            <div class="login-input-group__wrapper">
              <svg class="login-input-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="confirmPassword" class="login-input-group__input" placeholder="Confirm new password" required>
            </div>
            <div class="login-input-group__error" id="passwordError">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span id="passwordErrorText">Passwords do not match</span>
            </div>
          </div>

          <button type="submit" class="login-btn" id="resetBtn">
            <span class="login-btn__text">Reset Password</span>
            <div class="login-btn__spinner"></div>
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function() {
      const verifyForm = document.getElementById('verifyEmailForm');
      const resetForm = document.getElementById('resetPasswordForm');
      const emailInput = document.getElementById('resetEmail');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      
      const errorBanner = document.getElementById('errorBanner');
      const errorText = document.getElementById('errorText');
      const successBanner = document.getElementById('successBanner');
      const successText = document.getElementById('successText');
      
      const step1Indicator = document.getElementById('step1Indicator');
      const step2Indicator = document.getElementById('step2Indicator');
      const stepSubtitle = document.getElementById('stepSubtitle');

      let verifiedEmail = '';

      function hideBanners() {
        errorBanner.classList.remove('visible');
        successBanner.classList.remove('visible');
      }

      function showError(msg) {
        errorText.textContent = msg;
        errorBanner.classList.add('visible');
      }

      function showSuccess(msg) {
        successText.textContent = msg;
        successBanner.classList.add('visible');
      }

      // Step 1: Verify Email
      verifyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideBanners();

        const email = emailInput.value.trim();
        if (!email || !isValidEmail(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        const btn = document.getElementById('verifyBtn');
        btn.classList.add('login-btn--loading');
        btn.disabled = true;

        // Simulate network delay
        await new Promise(r => setTimeout(r, 800));
        
        btn.classList.remove('login-btn--loading');
        btn.disabled = false;

        // Verify against stored admin
        const admin = JSON.parse(localStorage.getItem(AUTH_KEYS.ADMIN_HASH));
        if (admin && admin.email.toLowerCase() === email.toLowerCase()) {
          verifiedEmail = email;
          
          // Switch to Step 2
          verifyForm.style.display = 'none';
          resetForm.style.display = 'flex';
          
          step1Indicator.classList.add('completed');
          step1Indicator.classList.remove('active');
          step2Indicator.classList.add('active');
          
          stepSubtitle.textContent = 'Create a new password for your account.';
        } else {
          showError('Email address not found.');
        }
      });

      // Step 2: Reset Password
      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideBanners();

        const newPass = newPasswordInput.value;
        const confPass = confirmPasswordInput.value;

        if (newPass.length < 6) {
          showError('Password must be at least 6 characters long.');
          return;
        }

        if (newPass !== confPass) {
          const group = document.getElementById('confirmPasswordGroup');
          group.classList.add('login-input-group--error');
          document.getElementById('passwordError').classList.add('visible');
          return;
        }

        const btn = document.getElementById('resetBtn');
        btn.classList.add('login-btn--loading');
        btn.disabled = true;

        // Simulate network
        await new Promise(r => setTimeout(r, 800));

        const result = await resetPassword(verifiedEmail, newPass, confPass);
        
        btn.classList.remove('login-btn--loading');
        btn.disabled = false;

        if (result.success) {
          resetForm.style.display = 'none';
          stepSubtitle.textContent = 'You can now securely log in to your account.';
          step2Indicator.classList.add('completed');
          showSuccess(result.message);
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showError(result.message);
        }
      });

      // Clear errors on input
      confirmPasswordInput.addEventListener('input', () => {
        document.getElementById('confirmPasswordGroup').classList.remove('login-input-group--error');
        document.getElementById('passwordError').classList.remove('visible');
        hideBanners();
      });

      newPasswordInput.addEventListener('input', hideBanners);
      emailInput.addEventListener('input', hideBanners);
    })();
  </script>
</body>
</html>
