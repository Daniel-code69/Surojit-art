<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login portal for Sarojit Pal Art learning platform. Secure access to course management and administration.">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Sarojit Pal Art</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔐%3C/text%3E%3C/svg%3E">
</head>
<body>

  <div class="login-page" id="loginPage">
    <!-- Background Floating Shapes -->
    <div class="login-bg-shape login-bg-shape--1"></div>
    <div class="login-bg-shape login-bg-shape--2"></div>
    <div class="login-bg-shape login-bg-shape--3"></div>
    <div class="login-bg-shape login-bg-shape--4"></div>

    <!-- Login Card -->
    <div class="login-card" id="loginCard">
      <!-- Header -->
      <div class="login-card__header">
        <a href="index.html" class="login-card__logo">
          <span class="login-card__logo-icon">🎨</span>
          <span class="login-card__logo-text">Sarojit Pal Art</span>
        </a>
        <h1 class="login-card__title">Admin Login</h1>
        <p class="login-card__subtitle">Sign in to manage your platform</p>
      </div>

      <!-- Body -->
      <div class="login-card__body">
        <!-- Error Banner -->
        <div class="login-error-banner" id="loginErrorBanner">
          <svg class="login-error-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span class="login-error-banner__text" id="loginErrorText">Invalid credentials</span>
        </div>

        <!-- Success Banner -->
        <div class="login-success-banner" id="loginSuccessBanner">
          <svg class="login-success-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span class="login-success-banner__text" id="loginSuccessText">Login successful!</span>
        </div>

        <!-- Rate Limit Warning -->
        <div class="login-rate-limit" id="rateLimitWarning">
          <div class="login-rate-limit__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <p class="login-rate-limit__text">Too many failed attempts. Try again in:</p>
          <span class="login-rate-limit__timer" id="lockoutTimer">60</span>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm">
          <!-- Email -->
          <div class="login-input-group" id="emailGroup">
            <label class="login-input-group__label" for="loginEmail">Email Address</label>
            <div class="login-input-group__wrapper">
              <svg class="login-input-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input
                type="email"
                id="loginEmail"
                class="login-input-group__input"
                placeholder="admin@sarojitpalart.com"
                autocomplete="email"
                required
              >
            </div>
            <div class="login-input-group__error" id="emailError">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span id="emailErrorText">Please enter a valid email</span>
            </div>
          </div>

          <!-- Password -->
          <div class="login-input-group" id="passwordGroup">
            <label class="login-input-group__label" for="loginPassword">Password</label>
            <div class="login-input-group__wrapper">
              <svg class="login-input-group__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="loginPassword"
                class="login-input-group__input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              >
              <button type="button" class="login-input-group__toggle" id="passwordToggle" aria-label="Show password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="login-input-group__error" id="passwordError">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span id="passwordErrorText">Password is required</span>
            </div>
          </div>

          <!-- Options Row -->
          <div class="login-form__options">
            <label class="login-form__remember">
              <input type="checkbox" id="rememberMe">
              <span class="login-form__remember-text">Remember me</span>
            </label>
            <a href="forgot-password.html" class="login-form__forgot">Forgot Password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="login-btn" id="loginBtn">
            <span class="login-btn__text">Sign In</span>
            <div class="login-btn__spinner"></div>
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="login-card__footer">
        <p class="login-card__footer-text">
          <a href="index.html" class="login-card__footer-link">← Back to Courses</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function() {
      // If already logged in, redirect to admin
      if (isAuthenticated()) {
        window.location.href = 'admin.html';
        return;
      }

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('loginEmail');
      const passwordInput = document.getElementById('loginPassword');
      const loginBtn = document.getElementById('loginBtn');
      const passwordToggle = document.getElementById('passwordToggle');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');
      const errorBanner = document.getElementById('loginErrorBanner');
      const errorText = document.getElementById('loginErrorText');
      const successBanner = document.getElementById('loginSuccessBanner');
      const successText = document.getElementById('loginSuccessText');
      const rateLimitWarning = document.getElementById('rateLimitWarning');
      const lockoutTimerEl = document.getElementById('lockoutTimer');

      let lockoutInterval = null;

      // ── Check if already locked out ──
      checkLockout();

      // ── Password Toggle ──
      passwordToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.style.display = isPassword ? 'none' : 'block';
        eyeOffIcon.style.display = isPassword ? 'block' : 'none';
        passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
      });

      // ── Real-time Validation ──
      emailInput.addEventListener('blur', () => {
        if (emailInput.value && !isValidEmail(emailInput.value)) {
          showFieldError('emailGroup', 'emailError', 'Please enter a valid email address');
        } else {
          clearFieldError('emailGroup', 'emailError');
        }
      });

      emailInput.addEventListener('input', () => {
        clearFieldError('emailGroup', 'emailError');
        hideBanners();
      });

      passwordInput.addEventListener('input', () => {
        clearFieldError('passwordGroup', 'passwordError');
        hideBanners();
      });

      // ── Form Submit ──
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Clear previous errors
        hideBanners();
        clearFieldError('emailGroup', 'emailError');
        clearFieldError('passwordGroup', 'passwordError');

        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const rememberMe = document.getElementById('rememberMe').checked;

        // Client-side validation
        let hasError = false;

        if (!email) {
          showFieldError('emailGroup', 'emailError', 'Email is required');
          hasError = true;
        } else if (!isValidEmail(email)) {
          showFieldError('emailGroup', 'emailError', 'Please enter a valid email address');
          hasError = true;
        }

        if (!password) {
          showFieldError('passwordGroup', 'passwordError', 'Password is required');
          hasError = true;
        }

        if (hasError) return;

        // Show loading state
        setLoading(true);

        // Simulate network delay for realism
        await new Promise(resolve => setTimeout(resolve, 800));

        // Attempt login
        const result = await attemptLogin(email, password, rememberMe);

        setLoading(false);

        if (result.success) {
          successText.textContent = result.message;
          successBanner.classList.add('visible');

          // Redirect after a brief delay
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 600);
        } else {
          if (result.locked) {
            showLockout(result.remainingSeconds);
          } else {
            errorText.textContent = result.message;
            errorBanner.classList.add('visible');
          }
        }
      });

      // ── Helper Functions ──
      function showFieldError(groupId, errorId, message) {
        const group = document.getElementById(groupId);
        const error = document.getElementById(errorId);
        const textEl = error.querySelector('span');
        if (textEl) textEl.textContent = message;
        group.classList.add('login-input-group--error');
        error.classList.add('visible');
      }

      function clearFieldError(groupId, errorId) {
        document.getElementById(groupId).classList.remove('login-input-group--error');
        document.getElementById(errorId).classList.remove('visible');
      }

      function hideBanners() {
        errorBanner.classList.remove('visible');
        successBanner.classList.remove('visible');
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.classList.toggle('login-btn--loading', loading);
      }

      function showLockout(seconds) {
        form.style.display = 'none';
        rateLimitWarning.classList.add('visible');
        startLockoutTimer(seconds);
      }

      function hideLockout() {
        form.style.display = 'flex';
        rateLimitWarning.classList.remove('visible');
        if (lockoutInterval) clearInterval(lockoutInterval);
      }

      function startLockoutTimer(seconds) {
        lockoutTimerEl.textContent = seconds;

        if (lockoutInterval) clearInterval(lockoutInterval);

        lockoutInterval = setInterval(() => {
          seconds--;
          lockoutTimerEl.textContent = seconds;

          if (seconds <= 0) {
            clearInterval(lockoutInterval);
            hideLockout();
            clearAttempts();
          }
        }, 1000);
      }

      function checkLockout() {
        const status = getLockoutStatus();
        if (status.locked) {
          showLockout(status.remainingSeconds);
        }
      }

      // ── Auto-fill email from "Remember Me" ──
      const remembered = localStorage.getItem(AUTH_KEYS.REMEMBER);
      if (remembered) {
        const admin = JSON.parse(localStorage.getItem(AUTH_KEYS.ADMIN_HASH));
        if (admin) {
          emailInput.value = admin.email;
          document.getElementById('rememberMe').checked = true;
        }
      }
    })();
  </script>
</body>
</html>
